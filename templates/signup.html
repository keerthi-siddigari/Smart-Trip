<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up | SmartTrip</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/2/2.2.1/iconify.min.js"></script>
  <style>
    /* Floating background circles animation */
    @keyframes floatSoft {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }
    .animate-float { animation: floatSoft 6s ease-in-out infinite; }
    .animate-float-slow { animation: floatSoft 10s ease-in-out infinite; }

    /* Selected tag styling */
    .preference-tag.selected {
      background-color: rgba(139, 92, 246, 0.6);
      border-color: #8b5cf6;
      color: #fff;
    }
  </style>
</head>

<body class="relative min-h-screen flex items-center justify-center 
             bg-gradient-to-br from-[#0f0c29] via-[#1c1b3a] to-[#24243e] overflow-hidden">

  <!-- Floating Background Circles -->
  <div class="absolute inset-0 overflow-hidden -z-10">
    <div class="absolute top-1/2 left-[-60px] w-48 h-48 bg-purple-500/20 rounded-full animate-float"></div>
    <div class="absolute top-1/3 right-[-40px] w-40 h-40 bg-pink-500/20 rounded-full animate-float-slow"></div>
    <div class="absolute bottom-16 left-24 w-32 h-32 bg-indigo-500/20 rounded-full animate-float"></div>
    <div class="absolute top-10 right-1/4 w-28 h-28 bg-purple-400/20 rounded-full animate-float-slow"></div>
  </div>

  <!-- Signup Card -->
  <div class="relative z-10 w-[90%] max-w-md backdrop-blur-xl bg-white/10 p-6 sm:p-8 rounded-2xl shadow-2xl text-white mx-auto"> 
    <div class="text-center mb-5">
      <h2 class="text-2xl font-bold mb-1">Create Account</h2>
      <p class="text-gray-300 text-sm">Start planning smarter trips today</p>
    </div>

    <!-- Message Box -->
    <div id="message" class="text-center text-sm mb-3"></div>

    <form id="signupForm" class="flex flex-col gap-3">

      <!-- Full Name -->
      <input type="text" id="username" placeholder="Full Name"
        class="w-full px-3 py-2 rounded-xl bg-white/10 border border-white/20
               focus:outline-none focus:ring-2 focus:ring-purple-500 transition" required />

      <!-- Email -->
      <input type="email" id="email" placeholder="Email"
        class="w-full px-3 py-2 rounded-xl bg-white/10 border border-white/20
               focus:outline-none focus:ring-2 focus:ring-purple-500 transition" required />

      <!-- Password -->
<div class="relative w-full mb-3">
  <input type="password" id="password" placeholder="Password"
    class="w-full px-3 py-2 rounded-xl bg-white/10 border border-white/20
           focus:outline-none focus:ring-2 focus:ring-purple-500 transition pr-10" required />
  
  <span class="absolute right-3 top-1/2 transform -translate-y-1/2 cursor-pointer text-gray-400"
        onclick="togglePassword('password', this)">
    <span class="iconify" data-icon="mdi:eye-outline"></span>
  </span>
</div>
     <!-- Confirm Password -->
<div class="relative w-full mb-3">
  <input type="password" id="confirmPassword" placeholder="Confirm Password"
    class="w-full px-3 py-2 rounded-xl bg-white/10 border border-white/20
           focus:outline-none focus:ring-2 focus:ring-purple-500 transition pr-10" required />
  
  <span class="absolute right-3 top-1/2 transform -translate-y-1/2 cursor-pointer text-gray-400"
        onclick="togglePassword('confirmPassword', this)">
    <span class="iconify" data-icon="mdi:eye-outline"></span>
  </span>
</div>
      <!-- Travel Preferences -->
      <div>
        <label class="block text-sm text-gray-300 mb-1">Travel Preferences</label>
        <div class="flex flex-wrap gap-2">
          <span class="preference-tag cursor-pointer px-3 py-1.5 rounded-full border border-gray-400 text-sm text-gray-200 hover:bg-purple-500/20 transition" data-value="Historic">Historic</span>
          <span class="preference-tag cursor-pointer px-3 py-1.5 rounded-full border border-gray-400 text-sm text-gray-200 hover:bg-purple-500/20 transition" data-value="Chilling">Chilling</span>
          <span class="preference-tag cursor-pointer px-3 py-1.5 rounded-full border border-gray-400 text-sm text-gray-200 hover:bg-purple-500/20 transition" data-value="Pilgrimage">Pilgrimage</span>
          <span class="preference-tag cursor-pointer px-3 py-1.5 rounded-full border border-gray-400 text-sm text-gray-200 hover:bg-purple-500/20 transition" data-value="Adventure">Adventure</span>
          <span class="preference-tag cursor-pointer px-3 py-1.5 rounded-full border border-gray-400 text-sm text-gray-200 hover:bg-purple-500/20 transition" data-value="Nature">Nature</span>
        </div>
        <p class="text-xs text-gray-400 mt-1">Select one or more preferences</p>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="w-full py-2.5 rounded-xl bg-gradient-to-r from-purple-600 to-pink-500
             hover:scale-105 transition duration-300 shadow-lg text-white font-semibold">
        Create Account
      </button>
    </form>

    <p class="text-center text-gray-300 mt-3 text-sm">
      Already have an account? <a href="/login" class="text-purple-400 hover:underline">Sign In</a>
    </p>

  </div>

  <script>
    // Tag selection logic
    const preferenceTags = document.querySelectorAll('.preference-tag');
    const selectedPreferences = new Set();

    preferenceTags.forEach(tag => {
      tag.addEventListener('click', () => {
        const value = tag.dataset.value;
        if (selectedPreferences.has(value)) {
          selectedPreferences.delete(value);
          tag.classList.remove('selected');
        } else {
          selectedPreferences.add(value);
          tag.classList.add('selected');
        }
      });
    });

    // Form submission
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const travel_preferences = Array.from(selectedPreferences);

      const messageDiv = document.getElementById('message');
      messageDiv.textContent = '';
      messageDiv.className = 'text-center text-sm mb-3';

      if (password !== confirmPassword) {
        messageDiv.textContent = 'Passwords do not match';
        messageDiv.classList.add('text-red-500');
        return;
      }

      try {
        const response = await fetch('/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password, travel_preferences })
        });

        const data = await response.json();

        if (response.status === 201) {
          messageDiv.textContent = data.message + ' Redirecting to login...';
          messageDiv.classList.add('text-green-500');
          setTimeout(() => { window.location.href = '/login'; }, 1500);
        } else {
          messageDiv.textContent = data.error;
          messageDiv.classList.add('text-red-500');
          if (data.redirect) {
            setTimeout(() => { window.location.href = data.redirect; }, 1500);
          }
        }
      } catch (err) {
        messageDiv.textContent = 'Something went wrong';
        messageDiv.classList.add('text-red-500');
      }
    });
   
    function togglePassword(fieldId, iconSpan) {
    const input = document.getElementById(fieldId);
    const icon = iconSpan.querySelector('.iconify');

    if (input.type === "password") {
        input.type = "text";
        icon.dataset.icon = "mdi:eye-off-outline";
    } else {
        input.type = "password";
        icon.dataset.icon = "mdi:eye-outline";
    }
}
  </script>

</body>
</html>
